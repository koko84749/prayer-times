# Prayer Times - Dunst/Hyprland Integration
# Add to your hyprland startup.conf or autostart:
#   exec-once = dunst &
#   exec-once = $HOME/.config/prayer-times/prayer-times.sh start

# Keyboard shortcuts (add to keybinds.conf):
#   bind = $mainMod CTRL, P, exec, $HOME/.config/prayer-times/prayer-times.sh status
#   bind = $mainMod CTRL, A, exec, $HOME/.config/prayer-times/prayer-times.sh select
#   bind = $mainMod CTRL, T, exec, $HOME/.config/prayer-times/prayer-times.sh test
